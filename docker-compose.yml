services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crest}
      POSTGRES_DB: ${POSTGRES_DB:-crest}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crest} -d ${POSTGRES_DB:-crest}"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # Persist personal data (portfolio, swings, config, scans, cache) across rebuilds.
      - crestdata:/app/backend/data

volumes:
  pgdata:
  crestdata:
